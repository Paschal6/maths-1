<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | Math CBT Pro</title>

    <link rel="stylesheet" href="main.css">

    <link rel="stylesheet" href="login.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link href="icon.ico" rel="icon" type="image/x-icon">
    <script defer src="auth.js"></script>

</head>

<body>

<header>

    <div class="logo">

        🧮 Math CBT Pro

    </div>

    <nav>

        <a href="index.html">Home</a>

        <a href="login.html">Login</a>

    </nav>

</header>

<section class="login-page">

<div class="login-box">

    <h1>Candidate Login</h1>

    <p>

        Login to begin your Mathematics CBT examination.

    </p>

<form id="loginForm">

<div class="form-group">

<label>

Full Name

</label>

<input

type="text"

id="name"

placeholder="Enter your full name"

required>

</div>

<div class="form-group">

<label>

Candidate Number

</label>

<input

type="text"

id="candidate"

placeholder="e.g CBT2026001"

required>

</div>

<div class="form-group">

<label>

Password

</label>

<input

type="password"

id="password"

placeholder="Password"

required>

</div>

<button

type="submit"

class="btn login-btn">

Login

</button>

</form>

<div class="login-footer">

<p>

Demo Login

</p>

<ul>

<li>Password can be any value.</li>

<li>Candidate Number is stored locally.</li>

</ul>

</div>

</div>

</section>

<footer>

© 2026 Math CBT Pro, By Kenneth Godspower. All Rights Reserved.

</footer>

</body>

</html>
