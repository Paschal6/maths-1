<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Math CBT Pro | Result</title>

<link rel="stylesheet"
href="main.css">

<link rel="stylesheet"
href="result.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<script defer src="result.js"></script>

<link href="icon.ico" rel="icon" type="image/x-icon">

</head>

<body>

<header class="result-header">

<h1>🧮 Math CBT Pro</h1>

<h3>Examination Result</h3>

</header>

<main class="result-container">

<div class="summary-card">

<h2 id="candidateName">

Loading...

</h2>

<p id="candidateNumber">

Loading...

</p>

</div>

<div class="score-grid">

<div class="score-card">

<h4>Score</h4>

<h1 id="score">

0 / 30

</h1>

</div>

<div class="score-card">

<h4>Percentage</h4>

<h1 id="percentage">

0%

</h1>

</div>

<div class="score-card">

<h4>Grade</h4>

<h1 id="grade">

A

</h1>

</div>

</div>

<section class="review-section">

<h2>

Answer Review

</h2>

<div id="reviewContainer">

</div>

</section>

<div class="buttons">

<button id="printBtn">

🖨 Print Result

</button>

<button id="restartBtn">

🔄 New Examination

</button>

</div>

</main>

</body>

</html>
