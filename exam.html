<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Math CBT Pro | Examination</title>

<link rel="stylesheet"
href="main.css">

<link href="icon.ico" rel="icon" type="image/x-icon">

<link rel="stylesheet"
href="exam.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<script defer src="storage.js"></script>
<script defer src="timer.js"></script>
<script defer src="exam.js"></script>

</head>

<body>

<header class="exam-header">

<div class="brand">

<h2>🧮 Math CBT Pro</h2>

</div>

<div class="candidate-info">

<p>

<strong>Name:</strong>

<span id="studentName">

Loading...

</span>

</p>

<p>

<strong>Candidate No:</strong>

<span id="candidateNumber">

Loading...

</span>

</p>

</div>

<div class="timer-box">

<h3>

Time Left

</h3>

<div id="timer">

60:00

</div>

</div>

</header>

<main class="exam-container">

<aside class="sidebar">

<h3>

Question Palette

</h3>

<div id="palette">

<!-- Generated by JavaScript -->

</div>

</aside>

<section class="question-area">

<div class="progress">

<div
class="progress-bar"
id="progressBar">

</div>

</div>

<div id="questionCard">

<h2 id="questionText">

Loading Question...

</h2>

<div id="options">

</div>

</div>

<div class="exam-buttons">

<button id="prevBtn">

⬅ Previous

</button>

<button id="flagBtn">

🚩 Flag

</button>

<button id="nextBtn">

Next ➜

</button>

</div>

<div class="submit-area">

<button id="submitExam">

Submit Examination

</button>

</div>

</section>

</main>

<div
id="submitModal"
class="modal hidden">

<div class="modal-content">

<h2>

Submit Examination?

</h2>

<p>

Are you sure you want to submit your answers?

</p>

<div class="modal-buttons">

<button id="cancelSubmit">

Cancel

</button>

<button id="confirmSubmit">

Yes, Submit

</button>

</div>

</div>

</div>

</body>

</html>
